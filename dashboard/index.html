<!doctype html>
<html lang="ru" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="robots" content="noindex,nofollow" />
    <title>Atlas Admin</title>

    <!-- PWA / iOS standalone -->
    <link rel="manifest" href="/dashboard/manifest.webmanifest" />
    <meta name="theme-color" content="#090b10" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Atlas Admin" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Atlas Admin" />

    <!-- App icons.  SVG renders crisp on Safari ≥ 14 and Chrome.
         Apple still expects PNG fallbacks at 180×180 for older OS;
         our icons are vector and Safari maps them automatically. -->
    <link rel="icon" type="image/svg+xml" href="/dashboard/icon.svg" />
    <link rel="apple-touch-icon" href="/dashboard/apple-touch-icon.png" />
    <link rel="mask-icon" href="/dashboard/icon-mono.svg" color="#6366f1" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body class="bg-bg text-fg antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Тёмный obsidian фон — почти #0A0A0A с лёгким углублением. -->
    <radialGradient id="bg" cx="50%" cy="20%" r="80%">
      <stop offset="0%"  stop-color="#1A1A1A"/>
      <stop offset="60%" stop-color="#0F0F0F"/>
      <stop offset="100%" stop-color="#050505"/>
    </radialGradient>

    <!-- Solid lime — основной акцент бренда. -->
    <linearGradient id="shield" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#E2FF85"/>
      <stop offset="55%"  stop-color="#D7FF67"/>
      <stop offset="100%" stop-color="#A6CC3F"/>
    </linearGradient>

    <!-- Rim — тонкая подсветка bottom-right. -->
    <linearGradient id="rim" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="white" stop-opacity="0"/>
      <stop offset="80%" stop-color="white" stop-opacity="0"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.18"/>
    </linearGradient>

    <!-- Top gloss — стеклянный блик сверху. -->
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="white" stop-opacity="0.32"/>
      <stop offset="60%" stop-color="white" stop-opacity="0"/>
    </linearGradient>

    <!-- Лаймовое halo вокруг щита. -->
    <radialGradient id="aura" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#D7FF67" stop-opacity="0.55"/>
      <stop offset="60%"  stop-color="#D7FF67" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#D7FF67" stop-opacity="0"/>
    </radialGradient>

    <filter id="soft-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>

    <!-- Тонкий paths шейдер для внутреннего «A» — drop slight glow. -->
    <filter id="line-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Подложка с радиусом скругления как у iOS-иконки. -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!-- Mesh-сетка тонкая, edge-fade через radial mask. -->
  <g opacity="0.12">
    <defs>
      <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
        <path d="M32 0 L0 0 0 32" fill="none" stroke="#94A3B8" stroke-width="0.5"/>
      </pattern>
      <radialGradient id="gridfade" cx="50%" cy="50%" r="60%">
        <stop offset="0%" stop-color="white" stop-opacity="1"/>
        <stop offset="100%" stop-color="white" stop-opacity="0"/>
      </radialGradient>
      <mask id="m1">
        <rect width="512" height="512" fill="url(#gridfade)"/>
      </mask>
    </defs>
    <rect width="512" height="512" fill="url(#grid)" mask="url(#m1)"/>
  </g>

  <!-- Аура за щитом — мягкое цветное свечение. -->
  <circle cx="256" cy="256" r="200" fill="url(#aura)" filter="url(#soft-glow)"/>

  <!-- Сам щит — современный, чуть скруглённый. -->
  <g transform="translate(256 256)">
    <!-- Outer glow (мягкое gradient свечение под щитом). -->
    <path
      d="M0 -150 Q120 -150 130 -100 L130 30 Q130 110 0 165 Q-130 110 -130 30 L-130 -100 Q-120 -150 0 -150 Z"
      fill="url(#shield)"
      opacity="0.35"
      filter="url(#soft-glow)"
    />
    <!-- Основной щит. -->
    <path
      d="M0 -150 Q120 -150 130 -100 L130 30 Q130 110 0 165 Q-130 110 -130 30 L-130 -100 Q-120 -150 0 -150 Z"
      fill="url(#shield)"
    />
    <!-- Top gloss highlight. -->
    <path
      d="M0 -150 Q120 -150 130 -100 L130 30 Q130 110 0 165 Q-130 110 -130 30 L-130 -100 Q-120 -150 0 -150 Z"
      fill="url(#gloss)"
    />
    <!-- Rim light bottom-right. -->
    <path
      d="M0 -150 Q120 -150 130 -100 L130 30 Q130 110 0 165 Q-130 110 -130 30 L-130 -100 Q-120 -150 0 -150 Z"
      fill="url(#rim)"
    />
    <!-- Тонкая обводка для чёткости силуэта (тёмная — под brand text). -->
    <path
      d="M0 -150 Q120 -150 130 -100 L130 30 Q130 110 0 165 Q-130 110 -130 30 L-130 -100 Q-120 -150 0 -150 Z"
      fill="none"
      stroke="#0A0A0A"
      stroke-opacity="0.25"
      stroke-width="2"
    />

    <!-- Abstract «A» monogram — тёмный stroke на лаймовом щите,
         матчит Urbanist «A» из brand-deck (чёрный bold). -->
    <g stroke="#0A0A0A" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="-55" y1="60" x2="0" y2="-65" stroke-width="14"/>
      <line x1="55"  y1="60" x2="0" y2="-65" stroke-width="14"/>
      <line x1="-32" y1="15" x2="32" y2="15" stroke-width="12"/>
    </g>

    <!-- Acsent dot — тонкая тёмная точка-узел в вершине. -->
    <circle cx="0" cy="-65" r="6" fill="#0A0A0A"/>
    <circle cx="0" cy="-65" r="14" fill="#0A0A0A" opacity="0.2"/>
  </g>
</svg>

# ──────────────────────────────────────────────────────────────
# CI Pipeline — runs on every push and PR to main/stage
# Jobs run in parallel for speed: lint, test, security, docker
# ──────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: [main, stage]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  # ── 1. Lint & static analysis ──────────────────────────────
  lint:
    name: Lint & Syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff lint
        run: ruff check . --output-format=github

      - name: Syntax check (compile all .py)
        run: python -m compileall . -q -x '.venv|__pycache__'

  # ── 2. Tests with PostgreSQL ───────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: atcs_test
          POSTGRES_USER: atcs
          POSTGRES_PASSWORD: test_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U atcs -d atcs_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      APP_ENV: local
      LOCAL_BOT_TOKEN: "0000000000:fake-token-for-ci"
      LOCAL_ADMIN_TELEGRAM_ID: "123456789"
      LOCAL_DATABASE_URL: "postgresql://atcs:test_pass@localhost:5432/atcs_test"
      LOCAL_WEBHOOK_URL: "https://fake.ci/webhook/telegram"
      LOCAL_WEBHOOK_SECRET: "ci-secret"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --tb=long \
            --junitxml=test-results.xml \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -v

      - name: Test Report (annotations in PR)
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Test Results
          path: test-results.xml
          reporter: java-junit
          fail-on-error: true

      - name: Generate test summary
        if: always()
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f test-results.xml ]; then
            TESTS=$(python3 -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('test-results.xml')
          root = tree.getroot()
          ts = root.find('.//testsuite') if root.tag != 'testsuite' else root
          if ts is None:
              ts = root
          total = ts.get('tests', '0')
          fail = ts.get('failures', '0')
          err = ts.get('errors', '0')
          skip = ts.get('skipped', '0')
          time = ts.get('time', '0')
          passed = int(total) - int(fail) - int(err) - int(skip)
          print(f'| Total | Passed | Failed | Errors | Skipped | Time |')
          print(f'|-------|--------|--------|--------|---------|------|')
          print(f'| {total} | {passed} | {fail} | {err} | {skip} | {float(time):.1f}s |')
          ")
            echo "$TESTS" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY

          # Show failed tests details
          if [ -f test-results.xml ]; then
            FAILURES=$(python3 -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('test-results.xml')
          root = tree.getroot()
          cases = root.iter('testcase')
          found = False
          for tc in cases:
              fail = tc.find('failure')
              err = tc.find('error')
              elem = fail if fail is not None else err
              if elem is not None:
                  if not found:
                      print('### Failed Tests')
                      print('')
                      found = True
                  name = tc.get('classname', '') + '::' + tc.get('name', '')
                  msg = elem.get('message', '')[:200]
                  text = (elem.text or '')[:500]
                  print(f'<details><summary>{name}</summary>')
                  print('')
                  print(f'**Message:** {msg}')
                  print('')
                  print('\`\`\`')
                  print(text)
                  print('\`\`\`')
                  print('</details>')
                  print('')
          if not found:
              print('All tests passed!')
          " 2>/dev/null || echo "Could not parse test details")
            echo "$FAILURES" >> $GITHUB_STEP_SUMMARY
          fi

          # Coverage summary
          if [ -f coverage.xml ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            COV=$(python3 -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('coverage.xml')
          root = tree.getroot()
          rate = float(root.get('line-rate', 0)) * 100
          print(f'### Coverage: {rate:.1f}%')
          " 2>/dev/null || echo "### Coverage: N/A")
            echo "$COV" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test-results.xml
            coverage.xml
          retention-days: 7

  # ── 3. Security scan ───────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install security tools
        run: pip install pip-audit safety

      - name: Check dependencies for known vulnerabilities
        run: pip-audit -r requirements.txt --desc on --fix --dry-run

      - name: Safety check
        run: safety check -r requirements.txt --output text

  # ── 4. Docker build verification ───────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: atcbot:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 5. Migration check ────────────────────────────────────
  migrations:
    name: Migration Integrity
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: atcs_migration_test
          POSTGRES_USER: atcs
          POSTGRES_PASSWORD: test_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U atcs -d atcs_migration_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Verify all migrations apply cleanly
        run: |
          for f in migrations/*.sql; do
            echo "Applying: $f"
            PGPASSWORD=test_pass psql -h localhost -U atcs -d atcs_migration_test -f "$f" \
              || { echo "FAILED: $f"; exit 1; }
          done
          echo "All migrations applied successfully."
